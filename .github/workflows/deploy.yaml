name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      services:
        description: "Space-separated services, or all"
        required: false
        default: "all"

jobs:
  find_changed_services:
    if: github.repository == 'Muxi-X/forum-be'
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.detect.outputs.list }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      deploy_dir: ${{ steps.vars.outputs.deploy_dir }}
      suffix: ${{ steps.vars.outputs.suffix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy vars
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "image_tag=dev" >> "$GITHUB_OUTPUT"
            echo "deploy_dir=~/forum-dev" >> "$GITHUB_OUTPUT"
            echo "suffix=_dev" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
            echo "deploy_dir=~/forum" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed back-end services
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUESTED="${{ github.event.inputs.services }}"
            if [ "$REQUESTED" = "all" ] || [ -z "$REQUESTED" ]; then
              SERVICES="chat feed gateway post user"
            else
              SERVICES="$REQUESTED"
            fi
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              SERVICES="chat feed gateway post user"
            else
              CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
              SERVICES=$(echo "$CHANGED" \
                | awk -F/ '/^microservice\/[^\/]+/ && $2 != "ocr" {print $2}' \
                | sort -u)
              if [ -z "$SERVICES" ] && echo "$CHANGED" | grep -qE '^(Dockerfile|Makefile|go\\.(mod|sum)|pkg/|model/|client/|config/|log/|util/|\\.github/workflows/)'; then
                SERVICES="chat feed gateway post user"
              fi
            fi
          fi
          SERVICES=$(echo "$SERVICES" | tr ' ' '\n' | awk 'NF && $0 != "ocr"' | sort -u | paste -sd ' ')
          if [ -n "$SERVICES" ]; then
            ONE_LINE=$(echo "$SERVICES" | paste -sd ' ')
            echo "list=$ONE_LINE" >> $GITHUB_OUTPUT
          else
            echo "list=" >> $GITHUB_OUTPUT
          fi

  nothing_deploy:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && needs.find_changed_services.outputs.list == ''
    runs-on: ubuntu-latest
    steps:
      - name: No services changed
        run: echo "No back-end services have changed"

  deploy_chat:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && contains(needs.find_changed_services.outputs.list, 'chat')
    uses: ./.github/workflows/service.yaml
    with:
      service: chat
      image_tag: ${{ needs.find_changed_services.outputs.image_tag }}
      deploy_dir: ${{ needs.find_changed_services.outputs.deploy_dir }}
      compose_service: forum_be_chat${{ needs.find_changed_services.outputs.suffix }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

  deploy_feed:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && contains(needs.find_changed_services.outputs.list, 'feed')
    uses: ./.github/workflows/service.yaml
    with:
      service: feed
      image_tag: ${{ needs.find_changed_services.outputs.image_tag }}
      deploy_dir: ${{ needs.find_changed_services.outputs.deploy_dir }}
      compose_service: forum_be_feed${{ needs.find_changed_services.outputs.suffix }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

  deploy_gateway:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && contains(needs.find_changed_services.outputs.list, 'gateway')
    uses: ./.github/workflows/service.yaml
    with:
      service: gateway
      image_tag: ${{ needs.find_changed_services.outputs.image_tag }}
      deploy_dir: ${{ needs.find_changed_services.outputs.deploy_dir }}
      compose_service: forum_be_gateway${{ needs.find_changed_services.outputs.suffix }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

  deploy_post:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && contains(needs.find_changed_services.outputs.list, 'post')
    uses: ./.github/workflows/service.yaml
    with:
      service: post
      image_tag: ${{ needs.find_changed_services.outputs.image_tag }}
      deploy_dir: ${{ needs.find_changed_services.outputs.deploy_dir }}
      compose_service: forum_be_post${{ needs.find_changed_services.outputs.suffix }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

  deploy_user:
    needs: find_changed_services
    if: github.repository == 'Muxi-X/forum-be' && contains(needs.find_changed_services.outputs.list, 'user')
    uses: ./.github/workflows/service.yaml
    with:
      service: user
      image_tag: ${{ needs.find_changed_services.outputs.image_tag }}
      deploy_dir: ${{ needs.find_changed_services.outputs.deploy_dir }}
      compose_service: forum_be_user${{ needs.find_changed_services.outputs.suffix }}
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_ADDR: ${{ secrets.SERVER_ADDR }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
