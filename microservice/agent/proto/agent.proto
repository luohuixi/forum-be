syntax = "proto3";

option go_package = "./proto";

package agent;

service AgentService {
  rpc AddKnowledge(AddKnowledgeRequest) returns (Response) {}
  rpc GiveAnswer(GiveAnswerRequest) returns (Response) {}
}

message AddKnowledgeRequest {
  string content = 1;
  uint32 post_id = 2;
  string split_type = 3;
  uint32 split_size = 4;
}

message GiveAnswerRequest {
  uint32 post_id = 1;
  string extra_content = 2;
}

message Response {}