syntax = "proto3";

option go_package = "./proto";

package chat;

service ChatService {
    rpc Create(CreateRequest) returns (Response) {}
    rpc GetList(GetListRequest) returns (GetListResponse) {}
    rpc ListHistory(ListHistoryRequest) returns (ListHistoryResponse) {}
    rpc UserList(UserListRequest) returns (UserListResponse) {}
    rpc MarkRead(ReadRequest) returns (Response) {}
}

message ListHistoryRequest {
    uint32 offset = 1;
    uint32 limit = 2;
    bool pagination = 3;
    uint32 user_id = 4;
    uint32 other_user_id = 5;
}

message CreateRequest {
    uint32 user_id = 1;
    uint32 target_user_id = 2;
    string content = 3;
    string type_name = 4;
    string time = 5;
}

message Response {}

message GetListRequest {
    uint32 user_id = 1;
    bool wait = 2;
}

message GetListResponse {
    repeated string list = 1;
}

message Message {
    string content = 1;
    string time = 2;
    string type_name = 3;
    uint32 sender_id = 4;
    uint32 receiver_id = 5;
    bool read = 6;
}

message ListHistoryResponse {
    repeated Message histories = 1;
}

message UserListRequest {
    uint32 user_id = 1;
    uint32 limit = 2;
    uint32 page = 3;
}

message UserStatus {
    uint32 id = 1;
    optional string name = 2;
    optional string avatar = 3;
    optional string last_message_time = 4;
    optional string last_message = 5;
    uint32 unread_count = 6;
}

message ReadRequest {
    uint32 user_id = 1;
    uint32 other_user_id = 2;
}

message UserListResponse {
    repeated UserStatus userLists = 1;
}
