host: forum.muxixyz.com
info:
  contact: {}
  description: The gateway of forum
  title: forum-gateway
  version: "1.0"
paths:
  /auth/login/student:
    post:
      consumes:
      - application/json
      description: login the student-forum
      parameters:
      - description: login_request
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/StudentLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/StudentLoginResponse'
      summary: 学生登录 api
      tags:
      - auth
  /auth/login/team:
    post:
      consumes:
      - application/json
      description: login the team-forum
      parameters:
      - description: login_request
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/TeamLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TeamLoginResponse'
      summary: 团队登录 api
      tags:
      - auth
  /auth/set_role/{id}:
    post:
      consumes:
      - application/json
      description: 前端无需接此接口，casbin只会在启动时读取一遍数据库，因此改权限不能直接修改数据库，故写一个接口
      parameters:
      - description: token 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Response'
      summary: 设置权限
      tags:
      - user
  /chat/history/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: token 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      - description: limit
        in: query
        name: limit
        type: integer
      - description: page
        in: query
        name: page
        type: integer
      - description: id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/chat.Message'
            type: array
      summary: 获取该用户的聊天记录
      tags:
      - chat
  /chat/userList:
    get:
      description: 获取该用户的聊天列表，包括每个聊天对象的名字和图片
      parameters:
      - description: token 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回用户列表
          schema:
            items:
              $ref: '#/definitions/chat.UserStatus'
            type: array
      summary: 获取该用户的聊天列表
      tags:
      - chat
  /chat/ws:
    get:
      description: |-
        通过 WebSocket 实现客户端与服务器之间的实时通信。
        使用 `ws://` 或 `wss://` 协议访问此接口，连接成功后可进行双向通信。
        客户端连接后，请使用 JSON 格式发送消息，结构如下：

        ```json
        {
        "target_user_id": 123,
        "content": "你好",
